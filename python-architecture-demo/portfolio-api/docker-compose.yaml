services:
  api:
    build: .

    env_file:
      - .env

    ports:
      - "8000:8000"

    depends_on:
      - postgres

  postgres:
    image: postgres:18-alpine

    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio-user
      POSTGRES_PASSWORD: super-dee-duper-2026!

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
